name: Sync Chinese READMEs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Chinese READMEs from public repos
        uses: actions/github-script@v7
        env:
          TARGET_DIR: content/docs/repo-readmes
          DOCS_DIR: content/docs
          ORG: NEVSTOP-LAB
          MIN_CHINESE_CHARS: "50"
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const org = process.env.ORG;
            const targetDir = process.env.TARGET_DIR;
            const docsDir = process.env.DOCS_DIR;
            const minChineseChars = parseInt(process.env.MIN_CHINESE_CHARS, 10);
            const absoluteTargetDir = path.join(process.env.GITHUB_WORKSPACE, targetDir);
            const absoluteDocsDir = path.join(process.env.GITHUB_WORKSPACE, docsDir);
            const tempTargetDir = `${absoluteTargetDir}.tmp`;
            const backupTargetDir = `${absoluteTargetDir}.bak-${Date.now()}`;

            const countChinese = (text) => (text.match(/\p{Script=Han}/gu) || []).length;
            const safeFileName = (name) =>
              name.toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-+|-+$/g, '') || 'repo';
            const escapeYamlSingleQuoted = (input) =>
              String(input || '')
                .replace(/\r?\n/g, ' ')
                .replace(/'/g, "''");
            const escapeMarkdownText = (input) => String(input || '').replace(/([\\`\[\]])/g, '\\$1');
            const collator = Intl.Collator.supportedLocalesOf(['zh-CN']).length
              ? new Intl.Collator('zh-CN', { sensitivity: 'base' })
              : new Intl.Collator('en', { sensitivity: 'base' });

            // Topic-based grouping. Order matters: first matching group wins.
            const groups = [
              {
                key: 'csm-apps',
                title: 'CSM 应用与示例',
                description: '基于 CSM 的应用范例、复用模块（csm-modsets）与示例工程。',
                match: (repo) => (repo.topics || []).some((t) => ['lv-csm-app', 'csm-modsets'].includes(t)),
              },
              {
                key: 'csm-core',
                title: 'CSM 核心框架与工具',
                description: 'CSM Framework 本体、官方扩展、IDE / 编辑器插件，以及 CSM 相关的资料集合。',
                match: (repo) => /^(communicable-state-machine|csm[-_])/i.test(repo.name)
                  || (repo.topics || []).some((t) => ['communicable-state-machine', 'labview-csm'].includes(t)),
              },
              {
                key: 'labview-libs',
                title: 'LabVIEW 库与工具',
                description: '通用 LabVIEW 库、UI 控件与工具型 VI Package。',
                match: (repo) => (repo.topics || []).some((t) => ['labview-library', 'labview-xcontrol', 'vipm', 'vip', 'utilities', 'utilites', 'environments', 'quickdrop'].includes(t))
                  || /^labview-/i.test(repo.name),
              },
              {
                key: 'lvcicd',
                title: 'lvCICD 与自动化',
                description: 'LabVIEW 持续集成相关的 GitHub Actions / VIPM 工具。',
                match: (repo) => (repo.topics || []).some((t) => ['cicd', 'lvcicd', 'github-actions'].includes(t)),
              },
              {
                key: 'ai-tools',
                title: 'AI 与跨平台工具',
                description: '与 AI、跨仓库同步、Python / C# 等相关的工具型仓库。',
                match: (repo) => (repo.topics || []).some((t) => ['ai', 'python'].includes(t)),
              },
              {
                key: 'examples',
                title: '示例与演示',
                description: 'LabVIEW / TestStand 等的独立示例项目。',
                match: (repo) => (repo.topics || []).includes('example'),
              },
            ];
            const otherGroup = {
              key: 'other',
              title: '其他',
              description: '尚未归类的仓库。',
            };

            const classify = (repo) => {
              for (const g of groups) {
                if (g.match(repo)) return g.key;
              }
              return otherGroup.key;
            };

            fs.rmSync(tempTargetDir, { recursive: true, force: true });
            fs.mkdirSync(tempTargetDir, { recursive: true });

            const repos = await github.paginate('GET /orgs/{org}/repos', {
              org,
              type: 'public',
              per_page: 100
            });

            const activeRepos = repos.filter((repo) => !repo.archived);
            const imported = [];
            const usedSlugs = new Set();

            for (const repo of activeRepos) {
              let readmeContent = '';
              try {
                const response = await github.request('GET /repos/{owner}/{repo}/readme', {
                  owner: repo.owner.login,
                  repo: repo.name,
                  headers: { accept: 'application/vnd.github.raw' }
                });
                if (typeof response.data === 'string') {
                  readmeContent = response.data;
                } else if (response.data && typeof response.data.content === 'string') {
                  readmeContent = response.data.encoding === 'base64'
                    ? Buffer.from(response.data.content, 'base64').toString('utf8')
                    : response.data.content;
                } else {
                  readmeContent = '';
                }
              } catch (error) {
                if (error.status === 404) {
                  continue;
                }
                core.warning(`Failed to fetch README for ${repo.full_name}: ${error.message}`);
                continue;
              }

              const chineseCount = countChinese(readmeContent);
              if (chineseCount < minChineseChars) {
                core.info(`Skipping ${repo.full_name}: only ${chineseCount} Chinese character(s) (minimum: ${minChineseChars})`);
                continue;
              }

              // Replace relative image paths with absolute raw.githubusercontent.com URLs
              const defaultBranch = repo.default_branch || 'HEAD';
              const rawBase = `https://raw.githubusercontent.com/${repo.full_name}/${defaultBranch}`;
              readmeContent = readmeContent.replace(
                /!\[([^\]]*)\]\((?!https?:\/\/|\/\/)([^)]+)\)/g,
                (match, alt, src) => `![${alt}](${rawBase}/${src.replace(/^\.\//, '')})`
              );

              // Build a clean, collision-free slug. Prefer the bare repo name; on
              // collision, append the numeric repo id as a suffix.
              let slug = safeFileName(repo.name);
              if (usedSlugs.has(slug)) {
                slug = `${slug}-${repo.id}`;
              }
              usedSlugs.add(slug);

              const description = (repo.description || '').trim()
                || `${repo.name} 仓库的中文 README（自动同步）。`;
              const topics = repo.topics || [];
              const groupKey = classify(repo);

              // Use stargazer count as weight (higher stars -> smaller weight -> earlier).
              // Negative ensures most-starred repos appear first when Hugo sorts ascending.
              const weight = -1 * (repo.stargazers_count || 0);

              const frontMatter = [
                '---',
                `title: '${escapeYamlSingleQuoted(repo.name)}'`,
                `linkTitle: '${escapeYamlSingleQuoted(repo.name)}'`,
                `description: '${escapeYamlSingleQuoted(description)}'`,
                `weight: ${weight}`,
                'draft: false',
                `repo_name: '${escapeYamlSingleQuoted(repo.full_name)}'`,
                `repo_url: '${escapeYamlSingleQuoted(repo.html_url)}'`,
                `repo_language: '${escapeYamlSingleQuoted(repo.language || '')}'`,
                `repo_stars: ${repo.stargazers_count || 0}`,
                `repo_group: '${escapeYamlSingleQuoted(groupKey)}'`,
                ...(topics.length ? [`topics: [${topics.map((t) => `'${escapeYamlSingleQuoted(t)}'`).join(', ')}]`] : []),
                '---',
                '',
                `> **${escapeMarkdownText(repo.full_name)}** · 来源：[GitHub](${repo.html_url})${repo.language ? ' · 语言：`' + repo.language + '`' : ''} · ⭐ ${repo.stargazers_count || 0}`,
                ...(repo.description ? ['>', `> ${escapeMarkdownText(repo.description)}`] : []),
                ...(topics.length ? ['>', `> 主题：${topics.map((t) => '`' + t + '`').join(' · ')}`] : []),
                '',
                '---',
                ''
              ].join('\n');

              const cleanedReadmeContent = readmeContent.replace(
                /^(?:>\s*)?自动同步来源[^\n]*\r?\n(?:>\s*)?导入规则[^\n]*(?:\r?\n(?:>\s*)?)*(?:\r?\n)*/u,
                ''
              );

              const fileName = `${slug}.md`;
              const filePath = path.join(tempTargetDir, fileName);
              fs.writeFileSync(filePath, `${frontMatter}\n${cleanedReadmeContent}\n`, 'utf8');
              imported.push({
                name: repo.name,
                description,
                slug,
                stars: repo.stargazers_count || 0,
                language: repo.language || '',
                url: repo.html_url,
                group: groupKey,
                topics,
              });
            }

            imported.sort((a, b) => (b.stars - a.stars) || collator.compare(a.name, b.name));

            // Build a grouped index page.
            const allGroups = [...groups, otherGroup];
            const grouped = new Map(allGroups.map((g) => [g.key, []]));
            for (const item of imported) {
              grouped.get(item.group).push(item);
            }

            const indexLines = [
              '---',
              'title: "仓库 README"',
              'description: "组织内 public 仓库的中文 README 自动导入列表，按主题分组浏览。"',
              'draft: false',
              '---',
              '',
              `自动同步自 [NEVSTOP-LAB 组织](https://github.com/${org}) 内 public 仓库的中文 README，`,
              `当 README 中包含不少于 ${minChineseChars} 个中文字符时被收录。当前共收录 **${imported.length}** 个仓库，按主题分组如下：`,
              '',
            ];
            if (imported.length === 0) {
              indexLines.push('当前没有可导入的中文 README。');
            } else {
              for (const g of allGroups) {
                const items = grouped.get(g.key);
                if (!items.length) continue;
                indexLines.push(`## ${g.title}`);
                indexLines.push('');
                indexLines.push(g.description);
                indexLines.push('');
                for (const item of items) {
                  const meta = [];
                  if (item.language) meta.push('`' + item.language + '`');
                  meta.push(`⭐ ${item.stars}`);
                  meta.push(`[GitHub](${item.url})`);
                  indexLines.push(`- [**${escapeMarkdownText(item.name)}**](/docs/repo-readmes/${item.slug}/) — ${escapeMarkdownText(item.description)}`);
                  indexLines.push(`  <br/><sub>${meta.join(' · ')}</sub>`);
                }
                indexLines.push('');
              }
            }
            const indexContent = indexLines.join('\n') + '\n';

            fs.writeFileSync(path.join(tempTargetDir, '_index.md'), indexContent, 'utf8');
            fs.rmSync(backupTargetDir, { recursive: true, force: true });
            if (fs.existsSync(absoluteTargetDir)) {
              fs.renameSync(absoluteTargetDir, backupTargetDir);
            }
            try {
              fs.renameSync(tempTargetDir, absoluteTargetDir);
              fs.rmSync(backupTargetDir, { recursive: true, force: true });
            } catch (error) {
              if (fs.existsSync(backupTargetDir)) {
                fs.rmSync(absoluteTargetDir, { recursive: true, force: true });
                fs.renameSync(backupTargetDir, absoluteTargetDir);
              }
              throw error;
            }

            // Ensure content/docs/_index.md exists for Hugo to recognize the section
            const docsIndexPath = path.join(absoluteDocsDir, '_index.md');
            if (!fs.existsSync(docsIndexPath)) {
              const docsIndex = [
                '---',
                'title: "文档"',
                'description: "NEVSTOP-LAB 站点文档入口"',
                'draft: false',
                '---',
                ''
              ].join('\n');
              fs.writeFileSync(docsIndexPath, docsIndex, 'utf8');
              core.info('Created content/docs/_index.md');
            }

            core.info(`Imported ${imported.length} Chinese README file(s).`);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage new content/docs directory
          git add content/docs/

          # Remove old repo-readmes location if it still exists in the index
          # (migration from content/repo-readmes -> content/docs/repo-readmes; safe to remove once migrated)
          if git ls-files --error-unmatch content/repo-readmes/ > /dev/null 2>&1; then
            git rm -r --cached content/repo-readmes/
          fi

          if git diff --cached --quiet --exit-code; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: sync Chinese READMEs from public repos"
          git push
